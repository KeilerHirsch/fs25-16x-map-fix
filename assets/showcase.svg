  <rect x="1211" y="582" width="10" height="16" fill="#3fb950"/><text x="56" y="118" font-size="19"><tspan fill="#3fb950">gsoc@katana</tspan><tspan fill="#8b949e">:</tspan><tspan fill="#58a6ff">~/fs25/16x-map-fix</tspan><tspan fill="#8b949e">$ </tspan><tspan fill="#e6edf3">16xmapfix ./bigmap16.zip</tspan></text><text x="56" y="164" fill="#c9d1d9">&#9656; scan density layers</text><text x="640" y="164" fill="#8b949e">16384px <tspan fill="#e6edf3">found</tspan></text><text x="56" y="200" fill="#c9d1d9">&#9656; resample &#8594; 8192px  <tspan fill="#6e7681">(nearest-neighbour)</tspan></text><rect x="640" y="184" width="58" height="24" rx="5" fill="#238636"/><text x="669" y="201" fill="#e6edf3" text-anchor="middle" font-size="14" font-weight="700">OK</text><text x="56" y="236" fill="#c9d1d9">&#9656; heightmap  2&#8319;+1 grid</text><text x="640" y="236" fill="#39c5cf">left byte-exact</text><text x="56" y="272" fill="#c9d1d9">&#9656; fields &amp; crops</text><text x="640" y="272" fill="#39c5cf">preserved &#183; 99.9% pixel-identical</text><text x="56" y="322" fill="#8b949e" font-size="15" letter-spacing="1">// GIANTS' hidden multiplayer ceiling &#8212; closed</text><text x="56" y="384" font-size="46" font-weight="800"><tspan fill="#f85149">878,987</tspan><tspan fill="#6e7681" font-size="34">  &#9472;&#9472;&#9654;  </tspan><tspan fill="#3fb950">0</tspan><tspan fill="#8b949e" font-size="22" font-weight="600">  allocReg errors</tspan></text><text x="56" y="436" font-size="19"><tspan fill="#3fb950" font-weight="700">&#10003; playable in multiplayer</tspan><tspan fill="#8b949e">  &#183;  x4+ stable</tspan></text><text x="56" y="466" font-size="16" fill="#6e7681">the 262 GB dedicated server that still crashed? now runs on a 16 GB client.</text><text x="56" y="512" font-size="19"><tspan fill="#3fb950">gsoc@katana</tspan><tspan fill="#8b949e">:</tspan><tspan fill="#58a6ff">~/fs25/16x-map-fix</tspan><tspan fill="#8b949e">$ </tspan></text><rect x="470" y="497" width="11" height="20" fill="#3fb950"/></svg>