<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" font-family="'Cascadia Code','JetBrains Mono',Consolas,'Courier New',monospace" role="img" aria-label="16x Map Fix terminal showcase"><defs><clipPath id="win"><rect x="24" y="24" width="1232" height="592" rx="12"/></clipPath></defs><rect x="0" y="0" width="1280" height="640" fill="#010409"/>
